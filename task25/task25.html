<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<style>
    body{
        background-color: lightgray;
    }
    h1{
        text-align: center;
        text-decoration: underline;
    }
    input{
        margin-left: 55px;
        margin-bottom: 10px;
        width: 250px;
        height: 25px;
    }
    textarea{
        margin-left: 55px;
    } 
    button{
        margin-left: 55px;
    }
    table{
        margin-left: 520px;
        margin-top: 20px;
    }
    .r1{
        margin-left: 60px;
        height: 15px;
        width: 15px;
    }
    .r2{
        margin-left: -200px;
        height: 15px;
        width: 15px;
    }
    .r3{
        margin-left: -180px;
        height: 15px;
        width: 15px;
    }
    textarea{
        height: 100px;
        width: 250px;
    }
</style>
<body>
    <h1>Registration form</h1>
    <form action="">
        <table>
            <tr>
                <td>First Name</td> <td><input type="text"></td>
            </tr>
            <tr>
                <td>Last Name</td> <td><input type="text"></td>
            </tr>
            <tr>
                <td>Nick Name</td> <td><input type="text"></td>
            </tr>
            <tr>
                <td>E mail</td> <td><input type="email"></td>
            </tr>
            <tr>
                <td>password</td> <td><input type="password"></td>
            </tr>
            <tr>
                <td>Date of Birth</td> <td><input type="date"></td>
            </tr>
            <tr>
                <td>Gender</td> <td><input type="radio" class="r1" name="1">Male</td> <td><input class="r2" type="radio" name="1">Female</td><td><input class="r3" type="radio" name="1">Others</td>
            </tr>
            <tr>
                <td>Mobile</td> <td><input type="number"></td>
            </tr>
            <tr>
                <td>Address</td> <td><textarea name="" id=""></textarea></td>
            </tr>
            <tr>
                <td></td><td><button type="submit">Submit</button> <button type="reset">Reset</button></td>
            </tr>
        </table>
    </form>
    
 
</body>
</html>
