<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font tag</title>
</head>
<body>
    <h1>Example Font tag</h1>
    <p>This is normal text without any font styling</p>
    <p style="color: blue;">Text with normal size and default face</p>
    <p style="color: green; font-size: 25px;">Text with normal size and default face</p>
    <p style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color: red;">Text with change face</p>
</body>
</html>
